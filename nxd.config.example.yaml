# NXD configuration — generated by 'nxd init'
# See https://github.com/tzone85/nexus-dispatch for documentation.

version: "1.0"
workspace:
    state_dir: ~/.nxd
    backend: sqlite
    log_level: info
    log_retention_days: 30
    update_check: true
    update_interval_hours: 48
models:
    tech_lead:
        provider: ollama
        model: gemma4:e4b
        max_tokens: 16000
    senior:
        provider: ollama
        model: gemma4:e4b
        max_tokens: 8000
    intermediate:
        provider: ollama
        model: gemma4:e4b
        max_tokens: 4000
    junior:
        provider: ollama
        model: gemma4:e4b
        max_tokens: 4000
    qa:
        provider: ollama
        model: gemma4:e4b
        max_tokens: 8000
    supervisor:
        provider: ollama
        model: gemma4:e4b
        max_tokens: 4000
    manager:
        provider: ollama
        model: gemma4:e4b
        max_tokens: 8000
    investigator:
        provider: ollama
        model: gemma4:e4b
        max_tokens: 16000
routing:
    junior_max_complexity: 3
    intermediate_max_complexity: 5
    max_retries_before_escalation: 2
    max_qa_failures_before_escalation: 3
    max_senior_retries: 2
    max_manager_attempts: 2
monitor:
    poll_interval_ms: 10000
    stuck_threshold_s: 120
    context_freshness_tokens: 150000
cleanup:
    worktree_prune: immediate
    branch_retention_days: 7
    log_archive: file
merge:
    auto_merge: true
    review_before_merge: false
    base_branch: main
    mode: local
    pr_template: |
        ## Story: {story_id}
        {description}
        ### Acceptance Criteria
        {acceptance_criteria}
planning:
    sequential_file_patterns:
        - package.json
        - '*.config.*'
        - src/core/*
    max_story_complexity: 5
    godmode: false
billing:
    default_rate: 150
    currency: USD
    hours_per_point:
        1:
            - 0.5
            - 1
        2:
            - 1
            - 2
        3:
            - 2
            - 3
        5:
            - 3
            - 5
        8:
            - 5
            - 8
        13:
            - 8
            - 13
    llm_costs:
        mode: subscription
controller:
    enabled: false
    interval_s: 0
    max_stuck_duration_s: 0
    auto_cancel: false
    auto_restart: false
    auto_reprioritize: false
    max_actions_per_tick: 0
    cooldown_s: 0
memory:
    enabled: true
investigation:
    command_allowlist:
        - ls
        - find
        - wc
        - grep
        - cat
        - head
        - tail
        - git log
        - git status
        - git diff
        - git ls-files
        - git blame
        - git branch
        - go build
        - go test
        - go mod
        - go vet
        - npm test
        - npm run
        - npm ls
        - python -m pytest
        - python -m py_compile
        - make
        - docker ps
        - docker-compose config
qa:
    success_criteria:
        - kind: command_succeeds
          value: go build ./...
        - kind: command_succeeds
          value: go vet ./...
        - kind: test_passes
          value: go test ./...
runtimes:
    aider:
        command: aider
        args:
            - --model
            - ollama_chat/deepseek-coder-v2:latest
            - --no-auto-commits
        models:
            - deepseek-coder-v2
            - qwen2.5-coder
        detection:
            idle_pattern: ^>
            permission_pattern: \[Y/n\]
    claude-code:
        command: claude
        args:
            - --dangerously-skip-permissions
        models:
            - opus-4
            - sonnet-4
            - haiku-4
        detection:
            idle_pattern: ^\$\s*$
            permission_pattern: \[Y/n\]
            plan_mode_pattern: Plan mode
    codex:
        command: codex
        args:
            - --full-auto
        models:
            - o3
            - o4-mini
        detection:
            idle_pattern: Codex>
            permission_pattern: approve|deny
    gemma:
        command: ""
        args: []
        models:
            - gemma4
        detection:
            idle_pattern: ""
            permission_pattern: ""
        native: true
        max_iterations: 20
        command_allowlist:
            - go build ./...
            - go test ./...
            - npm test
            - npm run build
            - make
            - make test
plugins:
    playbooks: []
    prompts: {}
    qa: []
    providers: {}
methodology:
    ddd: true
    tdd: true
    min_coverage_pct: 80
    allow_override: true
