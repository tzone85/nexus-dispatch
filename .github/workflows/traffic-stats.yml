name: Traffic Stats

on:
  schedule:
    # Runs every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  collect-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch traffic data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          DATE=$(date -u +"%Y-%m-%d")
          STATS_DIR="stats"
          SNAPSHOT_FILE="${STATS_DIR}/${DATE}.json"

          mkdir -p "$STATS_DIR"

          # Fetch clone and view data from GitHub Traffic API
          CLONES=$(gh api "repos/${REPO}/traffic/clones" 2>/dev/null || echo '{"count":0,"uniques":0,"clones":[]}')
          VIEWS=$(gh api "repos/${REPO}/traffic/popular/referrers" 2>/dev/null || echo '[]')
          PAGE_VIEWS=$(gh api "repos/${REPO}/traffic/views" 2>/dev/null || echo '{"count":0,"uniques":0,"views":[]}')
          FORKS=$(gh api "repos/${REPO}" --jq '.forks_count' 2>/dev/null || echo '0')
          STARS=$(gh api "repos/${REPO}" --jq '.stargazers_count' 2>/dev/null || echo '0')
          WATCHERS=$(gh api "repos/${REPO}" --jq '.subscribers_count' 2>/dev/null || echo '0')

          # Build snapshot JSON
          jq -n \
            --arg date "$DATE" \
            --arg repo "$REPO" \
            --argjson clones "$CLONES" \
            --argjson views "$PAGE_VIEWS" \
            --argjson referrers "$VIEWS" \
            --argjson forks "$FORKS" \
            --argjson stars "$STARS" \
            --argjson watchers "$WATCHERS" \
            '{
              snapshot_date: $date,
              repository: $repo,
              summary: {
                forks: $forks,
                stars: $stars,
                watchers: $watchers,
                clones_14d_total: $clones.count,
                clones_14d_unique: $clones.uniques,
                views_14d_total: $views.count,
                views_14d_unique: $views.uniques
              },
              clones: $clones.clones,
              views: $views.views,
              referrers: $referrers
            }' > "$SNAPSHOT_FILE"

          echo "Snapshot saved to $SNAPSHOT_FILE"
          cat "$SNAPSHOT_FILE"

      - name: Update summary
        run: |
          STATS_DIR="stats"

          # Build cumulative summary from all snapshots
          echo "# NXD Repository Traffic Stats" > "${STATS_DIR}/SUMMARY.md"
          echo "" >> "${STATS_DIR}/SUMMARY.md"
          echo "Auto-collected weekly by GitHub Actions. Each snapshot captures the 14-day rolling window from GitHub's Traffic API." >> "${STATS_DIR}/SUMMARY.md"
          echo "" >> "${STATS_DIR}/SUMMARY.md"
          echo "| Date | Clones (total) | Clones (unique) | Views (total) | Views (unique) | Stars | Forks |" >> "${STATS_DIR}/SUMMARY.md"
          echo "|------|---------------|----------------|--------------|---------------|-------|-------|" >> "${STATS_DIR}/SUMMARY.md"

          for f in $(ls -1 "${STATS_DIR}"/*.json 2>/dev/null | sort); do
            ROW=$(jq -r '[
              .snapshot_date,
              (.summary.clones_14d_total | tostring),
              (.summary.clones_14d_unique | tostring),
              (.summary.views_14d_total | tostring),
              (.summary.views_14d_unique | tostring),
              (.summary.stars | tostring),
              (.summary.forks | tostring)
            ] | "| " + join(" | ") + " |"' "$f" 2>/dev/null)
            if [ -n "$ROW" ]; then
              echo "$ROW" >> "${STATS_DIR}/SUMMARY.md"
            fi
          done

          echo "" >> "${STATS_DIR}/SUMMARY.md"
          echo "---" >> "${STATS_DIR}/SUMMARY.md"
          echo "Generated by [traffic-stats.yml](../.github/workflows/traffic-stats.yml)" >> "${STATS_DIR}/SUMMARY.md"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/
          if git diff --cached --quiet; then
            echo "No new traffic data to commit"
          else
            git commit -m "chore(stats): collect traffic snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
