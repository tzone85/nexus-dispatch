name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=50
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Non-blocking until golangci-lint ships a release built with Go 1.26+.
    # Remove continue-on-error once https://github.com/golangci/golangci-lint
    # publishes a compatible version.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        run: go build -o nxd ./cmd/nxd

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nxd-${{ matrix.os }}
          path: nxd

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    # S3-2: verify the Dockerfile still builds. Non-blocking on PR.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t nxd:ci .

  mempalace:
    name: MemPalace bridge
    runs-on: ubuntu-latest
    # Verifies our pinned MemPalace install + the Python bridge contract
    # hasn't drifted (search --results vs --max-results, wake-up vs
    # wakeup, etc.). Catches integration breakage that the unit tests
    # alone can't because they stub the bridge.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MemPalace
        run: pip install -r requirements.txt

      - name: Bridge health
        run: |
          python3 scripts/mempalace_bridge.py health | tee /dev/stderr | grep -q '"status": "ok"'

      - name: Bridge mine + search round-trip
        run: |
          python3 scripts/mempalace_bridge.py mine --wing ci-test --room smoke --text "ci roundtrip $(date)"
          python3 scripts/mempalace_bridge.py search --query "ci roundtrip" --wing ci-test --results 3 | tee /dev/stderr | grep -q '"status": "ok"'

  vulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    # Non-blocking — alert operators to known CVEs without holding back merges.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, lint, build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
