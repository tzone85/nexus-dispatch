name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26.4'

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=50
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Per-package coverage floors
        # Hot packages (state, criteria, llm, etc.) sit above their floor
        # today. Floors catch silent regressions when new feature code lands
        # without matching tests. Architectural ceilings (live infra needed)
        # are documented in CLAUDE.md and excluded from this gate. Floors are
        # set ~5pp below current coverage to leave room for honest noise.
        env:
          # Space-separated <pkg>:<floor> pairs. Edit in lockstep with
          # CLAUDE.md "Per-Package Coverage" when ratcheting floors up.
          FLOORS: >-
            internal/agent:85
            internal/artifact:85
            internal/config:85
            internal/criteria:65
            internal/devdb:70
            internal/devdb/docker:40
            internal/devdb/null:95
            internal/git:80
            internal/graph:90
            internal/improver:85
            internal/llm:85
            internal/memory:90
            internal/metrics:85
            internal/nlog:90
            internal/plugin:85
            internal/routing:80
            internal/runtime:80
            internal/sanitize:95
            internal/scratchboard:80
            internal/state:80
            internal/update:85
            internal/web:78
        run: |
          set -e
          # Capture per-package coverage from a fresh `go test -cover` run.
          # Format per line: ok  github.com/.../pkg  N.NNs  coverage: X.X%
          go test -cover -timeout 240s ./... > /tmp/cover.out 2>&1 || true

          FAIL=0
          for pair in $FLOORS; do
            pkg="${pair%:*}"
            floor="${pair##*:}"
            # Match the package path exactly (followed by whitespace), so
            # `internal/devdb` doesn't also match `internal/devdb/docker`.
            line=$(grep -E "github.com/tzone85/nexus-dispatch/${pkg}[[:space:]]" /tmp/cover.out | head -n 1 || true)
            if [ -z "$line" ]; then
              echo "::warning file=${pkg}::no coverage line found"
              continue
            fi
            pct=$(echo "$line" | sed -n 's/.*coverage: \([0-9.]*\)%.*/\1/p')
            if [ -z "$pct" ]; then
              echo "::warning file=${pkg}::could not parse coverage"
              continue
            fi
            below=$(echo "$pct < $floor" | bc -l)
            if [ "$below" = "1" ]; then
              echo "::error file=${pkg}::coverage ${pct}% < floor ${floor}%"
              FAIL=1
            else
              echo "OK ${pkg}: ${pct}% (floor ${floor}%)"
            fi
          done
          exit $FAIL

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26.4'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26.4'

      - name: Build binary
        run: go build -o nxd ./cmd/nxd

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nxd-${{ matrix.os }}
          path: nxd

  leak-check:
    name: Leak check
    runs-on: ubuntu-latest
    # Hard gate: blocks merge if private terms (client names, personal
    # paths, employer domains) slip into a public commit. Update
    # scripts/check-leaks.sh when adding new forbidden tokens.
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run leak check
        run: bash scripts/check-leaks.sh

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    # S3-2: verify the Dockerfile still builds. Non-blocking on PR.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build container image
        run: docker build -t nxd:ci .

  tmux-integration:
    name: tmux integration
    runs-on: ubuntu-latest
    # Runs the live-tmux test lane (build-tagged so the default
    # `go test ./...` lane doesn't try to spin up a tmux server in
    # CI containers that don't ship it). Covers the realRun /
    # realOutput paths that the mocked unit tests can't reach.
    # Non-blocking on PR so a transient tmux issue doesn't gate
    # merges, but failures are visible to operators.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26.4'

      - name: Install tmux
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          tmux -V

      - name: Run live-tmux tests
        run: go test -tags live_tmux -v -timeout 60s ./internal/tmux/...

  mempalace:
    name: MemPalace bridge
    runs-on: ubuntu-latest
    # Verifies our pinned MemPalace install + the Python bridge contract
    # hasn't drifted (search --results vs --max-results, wake-up vs
    # wakeup, etc.). Catches integration breakage that the unit tests
    # alone can't because they stub the bridge.
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install MemPalace
        run: pip install -r requirements.txt

      - name: Bridge health
        run: |
          python3 scripts/mempalace_bridge.py health | tee /dev/stderr | grep -q '"status": "ok"'

      - name: Bridge mine + search round-trip
        run: |
          python3 scripts/mempalace_bridge.py mine --wing ci-test --room smoke --text "ci roundtrip $(date)"
          python3 scripts/mempalace_bridge.py search --query "ci roundtrip" --wing ci-test --results 3 | tee /dev/stderr | grep -q '"status": "ok"'

  vulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    # Non-blocking — alert operators to known CVEs without holding back merges.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26.4'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, lint, build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26.4'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
