# VXD configuration — generated by 'vxd init'
# See https://github.com/tzone85/vortex-dispatch for documentation.

version: "1.0"
workspace:
    state_dir: ~/.vxd
    backend: dolt
    log_level: info
    log_retention_days: 30
models:
    tech_lead:
        provider: anthropic
        model: claude-opus-4-20250514
        max_tokens: 16000
    senior:
        provider: anthropic
        model: claude-sonnet-4-20250514
        max_tokens: 8000
    intermediate:
        provider: google
        model: gemma-4-27b-it
        max_tokens: 4000
    junior:
        provider: google
        model: gemma-4-27b-it
        max_tokens: 4000
    qa:
        provider: anthropic
        model: claude-sonnet-4-20250514
        max_tokens: 8000
    supervisor:
        provider: google
        model: gemma-4-27b-it
        max_tokens: 4000
    manager:
        provider: anthropic
        model: claude-sonnet-4-20250514
        max_tokens: 8000
routing:
    junior_max_complexity: 3
    intermediate_max_complexity: 5
    max_retries_before_escalation: 2
    max_qa_failures_before_escalation: 3
    max_senior_retries: 2
    max_manager_attempts: 2
    max_concurrent_agents: 5
monitor:
    poll_interval_ms: 10000
    stuck_threshold_s: 120
    context_freshness_tokens: 150000
cleanup:
    worktree_prune: immediate
    branch_retention_days: 7
    log_archive: dolt
merge:
    auto_merge: true
    review_mode: ""
    base_branch: main
    pr_template: |
        ## Story: {story_id}
        {description}
        ### Acceptance Criteria
        {acceptance_criteria}
planning:
    sequential_file_patterns:
        - package.json
        - '*.config.*'
        - src/core/*
    max_story_complexity: 5
    godmode: false
runtimes:
    claude-code:
        command: claude
        args:
            - --dangerously-skip-permissions
        models:
            - opus-4
            - sonnet-4
            - haiku-4
        detection:
            idle_pattern: ^\$\s*$
            permission_pattern: \[Y/n\]
            plan_mode_pattern: Plan mode
    codex:
        command: codex
        args:
            - --approval-mode
            - full-auto
        models:
            - o3
            - o4-mini
        detection:
            idle_pattern: Codex>
            permission_pattern: approve|deny
    gemini:
        command: gemini
        args:
            - --sandbox
        models:
            - gemini-2.5-pro
            - gemini-2.5-flash
        detection:
            idle_pattern: gemini>
            permission_pattern: Allow|Deny
    swe-agent:
        command: swe-agent
        args:
            - run
            - --agent.model.name
        models:
            - gpt-4o
            - claude-sonnet-4-20250514
        detection:
            idle_pattern: SWE-agent>
            permission_pattern: confirm|cancel
billing:
    default_rate: 150
    currency: USD
    hours_per_point:
        1:
            - 0.5
            - 1
        2:
            - 1
            - 2
        3:
            - 2
            - 3
        5:
            - 3
            - 5
        8:
            - 5
            - 8
        13:
            - 8
            - 13
    llm_costs:
        mode: subscription
qa: {}
sla:
    max_minutes_per_complexity:
        1: 60
        2: 120
        3: 240
        5: 480
        8: 960
        13: 1920
    auto_escalate: false
secrets:
    provider: ""
    vault_addr: ""
    vault_token: ""
    vault_mount: ""
    vault_path: ""
